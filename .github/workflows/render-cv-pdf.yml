name: Render CV PDF

on:
  push:
    branches:
      - main
    paths:
      - assets/cv.typ
      - "assets/fonts/**"
      - .github/workflows/render-cv-pdf.yml

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-lato

      - name: Compile CV PDF
        shell: bash
        run: |
          font_args=()
          [[ -d assets/fonts ]] && font_args=(--font-path assets/fonts)
          typst compile "${font_args[@]}" assets/cv.typ assets/cv.pdf

      - name: Commit and push CV PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cv.pdf
          git diff --cached --quiet && exit 0
          git commit -m "chore: render CV PDF"
          git push