name: Render Typst PDFs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Typst
        uses: typst-community/setup-typst@v5

      - name: Compile Typst files to adjacent PDFs
        run: |
          mapfile -d '' files < <(find . -name '*.typ' -print0)
          for f in "${files[@]}"; do
            typst compile "$f" "${f%.typ}.pdf"
          done

      - name: Commit and push rendered PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.pdf'
          git diff --cached --quiet && exit 0
          git commit -m "chore: render typst PDFs"
          git push
