version: "3"

tasks:
  # ── Devcontainer Hooks ─────────────────────────────────────────────────────
  dev:setup:
    desc: "Main setup hook (runs on postCreate in devcontainer)"
    deps:
      - task: zsh:setup
      - task: git:setup
      - task: rust:install
  dev:start:
    desc: "Startup hook (runs on postStart in devcontainer)"
    deps: [git:submodules:update, pm2:start]
  pm2:start:
    desc: "Start/restart pm2 services (idempotent, sequential)"
    cmd: pm2 start ecosystem.config.js

  # ── Zsh ──────────────────────────────────────────────────────────────────────
  zsh:setup:
    desc: "Apply zsh configuration from devcontainer"
    cmds:
      - for f in .devcontainer/home/*; do cp -f "$f" ~/; done
      - direnv allow .

  # ── Git ──────────────────────────────────────────────────────────────────────
  git:setup:
    desc: "Rewrite Git URLs to use Token (Codespaces only)"
    status:
      - '[ "$CODESPACES" != "true" ]'
    vars:
      AuthURL: "https://x-access-token:{{.GITHUB_TOKEN}}@github.com/"
    cmds:
      - for:
          - "ssh://git@github.com/"
          - "git@github.com/"
          - "git@github.com:"
        cmd: git config --global --add url.{{.AuthURL}}.insteadOf {{.ITEM}}
  git:submodules:update:
    desc: "Update Git submodules"
    cmd: git submodule update --init --recursive

  # ── Rust ──────────────────────────────────────────────────────────────────────
  rust:install:
    desc: "Install Rust toolchain"
    cmd: rustup toolchain install